<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Collage | Mosaiko</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">
            <div class="logo-icono">G</div>
            <div class="logo-texto">Gridly</div>
        </a>

        <input type="search" placeholder="Buscar ideas, diseños, arquitectura..." class="buscador">

        <nav>
            <a href="usuario.html" class="link-texto">Mi Perfil</a>
            <a href="login.html" class="btn-primario">Cerrar Sesión</a>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar-izq">
            <nav class="menu-lateral">
                <div class="grupo-menu">
                    <a href="index.html" class="item-menu"><span class="icono"></span> Inicio</a>
                    <a href="explorar.html" class="item-menu"><span class="icono"></span> Explorar</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Tablero</h3>
                    <a href="pines.html" class="item-menu"><span class="icono"></span> Pines</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Crear</h3>
                    <a href="publicacion.html" class="item-menu"><span class="icono"></span> Publicación</a>
                    <a href="tableros.html" class="item-menu"><span class="icono"></span> Tableros</a>
                    <a href="collages.html" class="item-menu activo" style="font-weight:bold; color:var(--color-morado);"><span class="icono"></span> Collage</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Social</h3>
                    <a href="notificaciones.html" class="item-menu"><span class="icono"></span> Notificaciones</a>
                    <a href="mensajeria.html" class="item-menu"><span class="icono"></span> Mensajería</a>
                </div>
            </nav>
        </aside>

        <main class="contenido-principal">
            <!-- 6. CREAR COLLAGE -->
            <section class="seccion-app sec-crear-collage" style="display: block;">
                <div class="layout-collage">
                    <div class="lienzo-collage">
                        <h3 style="color:var(--color-azul); opacity:0.3; position:absolute; top:20px; left:20px;">Lienzo de Collage</h3>
                        <!-- Elementos de ejemplo en el lienzo -->
                        <div class="elemento-collage" style="top: 20%; left: 10%; width: 180px; height: 180px; background:var(--color-morado);"></div>
                        <div class="elemento-collage" style="top: 40%; left: 40%; width: 250px; height: 150px; background:var(--color-amarillo);"></div>
                    </div>
                    <aside class="sidebar-collage">
                        <h4>Añadir al Collage</h4>
                        <input type="search" placeholder="Buscar publicaciones..." class="buscador-collage input-form" style="margin-top: 15px;">
                        <select class="input-form" style="margin-top: 10px;">
                            <option>Explorar (Por defecto)</option>
                            <option>Mis Tableros</option>
                        </select>
                        <div class="resultados-collage">
                            <div class="mini-pin" style="background:#002147;"></div>
                            <div class="mini-pin" style="background:#4a0073;"></div>
                            <div class="mini-pin" style="background:#dca00f;"></div>
                            <div class="mini-pin" style="background:#EAE8E3;"></div>
                        </div>
                    </aside>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Script para Autenticación -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
</body>

</html>
