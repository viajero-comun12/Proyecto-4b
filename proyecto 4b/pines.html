<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pines | Mosaiko</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">
            <div class="logo-icono">G</div>
            <div class="logo-texto">Gridly</div>
        </a>

        <input type="search" placeholder="Buscar ideas, diseños, arquitectura..." class="buscador">

        <nav>
            <a href="usuario.html" class="link-texto">Mi Perfil</a>
            <a href="login.html" class="btn-primario">Cerrar Sesión</a>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar-izq">
            <nav class="menu-lateral">
                <div class="grupo-menu">
                    <a href="index.html" class="item-menu"><span class="icono"></span> Inicio</a>
                    <a href="explorar.html" class="item-menu"><span class="icono"></span> Explorar</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Tablero</h3>
                    <a href="pines.html" class="item-menu activo" style="font-weight:bold; color:var(--color-morado);"><span class="icono"></span> Pines</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Crear</h3>
                    <a href="publicacion.html" class="item-menu"><span class="icono"></span> Publicación</a>
                    <a href="tableros.html" class="item-menu"><span class="icono"></span> Tableros</a>
                    <a href="collages.html" class="item-menu"><span class="icono"></span> Collage</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Social</h3>
                    <a href="notificaciones.html" class="item-menu"><span class="icono"></span> Notificaciones</a>
                    <a href="mensajeria.html" class="item-menu"><span class="icono"></span> Mensajería</a>
                </div>
            </nav>
        </aside>

        <main class="contenido-principal">
            <!-- 3. PINES (TABLERO) -->
            <section class="seccion-app sec-pines" style="display: block;">
                <!-- Controles para el Tablero -->
                <input type="radio" name="filtro-pines" id="filtro-todos" checked hidden>
                <input type="radio" name="filtro-pines" id="filtro-subidos" hidden>
                <input type="radio" name="filtro-pines" id="filtro-guardados" hidden>
                
                <input type="radio" name="vista-pines" id="vista-normal" checked hidden>
                <input type="radio" name="vista-pines" id="vista-compacta" hidden>

                <div class="encabezado-seccion flex-between">
                    <h2>Mis Pines</h2>
                    <div class="controles-vista">
                        <div class="filtros">
                            <label for="filtro-todos" class="btn-filtro">Todos</label>
                            <label for="filtro-subidos" class="btn-filtro">Mis Subidas</label>
                            <label for="filtro-guardados" class="btn-filtro">Guardados</label>
                        </div>
                        <div class="vistas">
                            <label for="vista-normal" class="btn-filtro">🖼 Normal</label>
                            <label for="vista-compacta" class="btn-filtro">🗂 Compacta</label>
                        </div>
                    </div>
                </div>
                <!-- El contenedor cambia dinámicamente con CSS -->
                <section class="feed-dinamico feed-mosaico" id="feed-pines">
                    <p style="text-align: center; width: 100%; color: #8892a0;">Cargando tus pines...</p>
                </section>
            </section>
        </main>
    </div>
    
    <!-- Script para Autenticación -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const feedPines = document.getElementById('feed-pines');
            const usuarioId = localStorage.getItem('usuario_id');
            if (!usuarioId) {
                feedPines.innerHTML = "Inicia sesión para ver tus pines.";
                return;
            }
            fetch('http://localhost:8000/publicaciones/')
                .then(r => r.json())
                .then(pubs => {
                    const misPubs = pubs.filter(p => p.usuario_id == usuarioId);
                    feedPines.innerHTML = '';
                    if(misPubs.length === 0) feedPines.innerHTML = "No tienes pines aún.";
                    
                    misPubs.forEach(pub => {
                        feedPines.innerHTML += `
                            <article class="tarjeta-pin pin-subido" onclick="window.location.href='detalle.html?id=${pub.id}'">
                                <div class="imagen-wrapper" style="padding-bottom: 100%;">
                                    <img src="${pub.url_multimedia}" alt="${pub.titulo}" style="position:absolute; width:100%; height:100%; object-fit:cover;"
                                         onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22 viewBox=%220 0 400 400%22%3E%3Crect width=%22400%22 height=%22400%22 fill=%22%23EAE8E3%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2216%22 fill=%22%23999%22%3ESin imagen%3C/text%3E%3C/svg%3E';">
                                    <div class="pin-overlay">
                                        <button class="btn-guardar" onclick="event.stopPropagation(); window.location.href='detalle.html?id=${pub.id}'">Ver detalle</button>
                                    </div>
                                </div>
                                <div class="info-basica"><p>${pub.titulo}</p></div>
                            </article>`;
                    });
                }).catch(e => feedPines.innerHTML = "Error al cargar");
        });
    </script>
</body>

</html>
