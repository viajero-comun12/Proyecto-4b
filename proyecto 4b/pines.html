<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pines | Mosaiko</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">
            <div class="logo-icono">G</div>
            <div class="logo-texto">Gridly</div>
        </a>

        <input type="search" placeholder="Buscar ideas, diseños, arquitectura..." class="buscador">

        <nav>
            <a href="usuario.html" class="link-texto">Mi Perfil</a>
            <a href="login.html" class="btn-primario">Cerrar Sesión</a>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar-izq">
            <nav class="menu-lateral">
                <div class="grupo-menu">
                    <a href="index.html" class="item-menu"><span class="icono"></span> Inicio</a>
                    <a href="explorar.html" class="item-menu"><span class="icono"></span> Explorar</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Tablero</h3>
                    <a href="pines.html" class="item-menu activo" style="font-weight:bold; color:var(--color-morado);"><span class="icono"></span> Pines</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Crear</h3>
                    <a href="publicacion.html" class="item-menu"><span class="icono"></span> Publicación</a>
                    <a href="tableros.html" class="item-menu"><span class="icono"></span> Tableros</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Social</h3>
                    <a href="notificaciones.html" class="item-menu"><span class="icono"></span> Notificaciones</a>
                    <a href="mensajeria.html" class="item-menu"><span class="icono"></span> Mensajería</a>
                    <a href="seguidos.html" class="item-menu"><span class="icono"></span> Seguidos</a>
                </div>
            </nav>
        </aside>

        <main class="contenido-principal">
            <!-- 3. PINES (TABLERO) -->
            <section class="seccion-app sec-pines" style="display: block;">
                <!-- Controles para el Tablero -->
                <input type="radio" name="filtro-pines" id="filtro-todos" checked hidden>
                <input type="radio" name="filtro-pines" id="filtro-subidos" hidden>
                <input type="radio" name="filtro-pines" id="filtro-guardados" hidden>
                
                <input type="radio" name="vista-pines" id="vista-normal" checked hidden>
                <input type="radio" name="vista-pines" id="vista-compacta" hidden>

                <div class="encabezado-seccion flex-between">
                    <h2>Mis Pines</h2>
                    <div class="controles-vista">
                        <div class="filtros">
                            <label for="filtro-todos" class="btn-filtro">Todos</label>
                            <label for="filtro-subidos" class="btn-filtro">Mis Subidas</label>
                            <label for="filtro-guardados" class="btn-filtro">Guardados</label>
                        </div>
                        <div class="vistas">
                            <label for="vista-normal" class="btn-filtro">🖼 Normal</label>
                            <label for="vista-compacta" class="btn-filtro">🗂 Compacta</label>
                        </div>
                    </div>
                </div>
                <!-- El contenedor cambia dinámicamente con CSS -->
                <section class="feed-dinamico feed-mosaico" id="feed-pines">
                    <p style="text-align: center; width: 100%; color: #8892a0;">Cargando tus pines...</p>
                </section>
            </section>
        </main>
    </div>
    
    <!-- Script para Autenticación -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const feedPines = document.getElementById('feed-pines');
            const usuarioId = localStorage.getItem('usuario_id');
            if (!usuarioId) {
                feedPines.innerHTML = "Inicia sesión para ver tus pines.";
                return;
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const urlTableroId = urlParams.get('tablero');
            
            let misPubs = [];
            let misPines = [];
            let misTableros = [];
            
            const radioTodos = document.getElementById('filtro-todos');
            const radioSubidos = document.getElementById('filtro-subidos');
            const radioGuardados = document.getElementById('filtro-guardados');
            
            async function cargarDatos() {
                feedPines.innerHTML = '<p style="text-align: center; width: 100%; color: #8892a0;">Cargando tus pines...</p>';
                try {
                    // Cargar pines subidos
                    const resP = await fetch(`${API_URL}/publicaciones/`);
                    const pubs = await resP.json();
                    misPubs = pubs.filter(p => p.usuario_id == usuarioId);
                    
                    // Cargar pines (likes)
                    const resL = await fetch(`${API_URL}/usuarios/${usuarioId}/pines`);
                    misPines = await resL.json();
                    
                    // Cargar tableros
                    const resT = await fetch(`${API_URL}/usuarios/${usuarioId}/tableros/`);
                    misTableros = await resT.json();
                    
                    if (urlTableroId) {
                        renderTableroEspecifico(urlTableroId);
                    } else {
                        renderVistaActual();
                    }
                } catch(e) {
                    feedPines.innerHTML = "<p style='color:red; text-align:center;'>Error al cargar datos</p>";
                }
            }
            
            function renderVistaActual() {
                if(radioTodos.checked) renderTodos();
                else if(radioSubidos.checked) renderSubidos();
                else if(radioGuardados.checked) renderGuardados();
            }
            
            function renderPinsHTML(pinesArray, mensajeVacio) {
                feedPines.innerHTML = '';
                if (pinesArray.length === 0) {
                    feedPines.innerHTML = `<p style='text-align: center; width: 100%; color: #8892a0;'>${mensajeVacio}</p>`;
                    return;
                }
                
                pinesArray.forEach(pub => {
                    feedPines.innerHTML += `
                        <article class="tarjeta-pin pin-subido" onclick="window.location.href='detalle.html?id=${pub.id}'">
                            <div class="imagen-wrapper" style="padding-bottom: 100%;">
                                <img src="${pub.url_multimedia}" alt="${pub.titulo}" style="position:absolute; width:100%; height:100%; object-fit:cover;"
                                     onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22 viewBox=%220 0 400 400%22%3E%3Crect width=%22400%22 height=%22400%22 fill=%22%23EAE8E3%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2216%22 fill=%22%23999%22%3ESin imagen%3C/text%3E%3C/svg%3E';">
                                <div class="pin-overlay">
                                    <button class="btn-guardar" onclick="event.stopPropagation(); window.location.href='detalle.html?id=${pub.id}'">Ver detalle</button>
                                </div>
                            </div>
                            <div class="info-basica"><p>${pub.titulo}</p></div>
                        </article>`;
                });
            }
            
            function renderTodos() {
                document.querySelector('.encabezado-seccion h2').textContent = "Todos los Pines";
                let todos = misPubs.concat(misPines);
                misTableros.forEach(t => { todos = todos.concat(t.publicaciones); });
                
                // Deduplicar
                const uniqueMap = new Map();
                todos.forEach(p => uniqueMap.set(p.id, p));
                renderPinsHTML(Array.from(uniqueMap.values()), "No hay pines para mostrar.");
            }
            
            function renderSubidos() {
                document.querySelector('.encabezado-seccion h2').textContent = "Mis Subidas";
                renderPinsHTML(misPubs, "No has subido ningún pin aún.");
            }
            
            function renderGuardados() {
                document.querySelector('.encabezado-seccion h2').textContent = "Mis Guardados (Tableros y Favoritos)";
                feedPines.innerHTML = '';
                
                // Primero, renderizamos los tableros como carpetas
                if (misTableros.length > 0) {
                    misTableros.forEach(t => {
                        const portadas = t.publicaciones.length > 0 ? t.publicaciones.map(p => p.url_multimedia) : [''];
                        const coverStyle = portadas[0] ? `background-image: url('${portadas[0]}'); background-size: cover; background-position: center;` : `background-color: var(--color-morado);`;
                        
                        feedPines.innerHTML += `
                            <article class="tarjeta-pin" style="cursor: pointer;" onclick="window.location.href='pines.html?tablero=${t.id}'">
                                <div class="imagen-wrapper" style="padding-bottom: 80%; ${coverStyle} border-radius: 12px;"></div>
                                <div class="info-basica">
                                    <strong>📁 ${t.nombre}</strong>
                                    <p style="color: #8892a0; font-size: 0.85rem;">${t.publicaciones.length} pines</p>
                                </div>
                            </article>
                        `;
                    });
                }
                
                // Renderizamos pines a los que dio like
                misPines.forEach(pub => {
                    feedPines.innerHTML += `
                        <article class="tarjeta-pin pin-subido" onclick="window.location.href='detalle.html?id=${pub.id}'">
                            <div class="imagen-wrapper" style="padding-bottom: 100%;">
                                <img src="${pub.url_multimedia}" alt="${pub.titulo}" style="position:absolute; width:100%; height:100%; object-fit:cover;"
                                     onerror="this.src='data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22 viewBox=%220 0 400 400%22%3E%3Crect width=%22400%22 height=%22400%22 fill=%22%23EAE8E3%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2216%22 fill=%22%23999%22%3ESin imagen%3C/text%3E%3C/svg%3E';">
                                <div class="pin-overlay">
                                    <button class="btn-guardar" onclick="event.stopPropagation(); window.location.href='detalle.html?id=${pub.id}'">❤️ Me gusta</button>
                                </div>
                            </div>
                            <div class="info-basica"><p>${pub.titulo}</p></div>
                        </article>`;
                });
                
                if(misTableros.length === 0 && misPines.length === 0) {
                    feedPines.innerHTML = `<p style='text-align: center; width: 100%; color: #8892a0;'>No has guardado nada aún.</p>`;
                }
            }
            
            function renderTableroEspecifico(tid) {
                const tab = misTableros.find(t => t.id == tid);
                if (tab) {
                    document.querySelector('.encabezado-seccion h2').textContent = `Tablero: ${tab.nombre}`;
                    renderPinsHTML(tab.publicaciones, "Este tablero está vacío.");
                    
                    // Asegurarnos de que el filtro "Guardados" esté seleccionado visualmente
                    radioGuardados.checked = true;
                } else {
                    renderVistaActual();
                }
            }
            
            // Event Listeners para los radios
            radioTodos.addEventListener('change', () => { if(radioTodos.checked) { window.history.pushState({}, '', 'pines.html'); renderTodos(); }});
            radioSubidos.addEventListener('change', () => { if(radioSubidos.checked) { window.history.pushState({}, '', 'pines.html'); renderSubidos(); }});
            radioGuardados.addEventListener('change', () => { if(radioGuardados.checked) { window.history.pushState({}, '', 'pines.html'); renderGuardados(); }});
            
            cargarDatos();
        });
    </script>
</body>

</html>
