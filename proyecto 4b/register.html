<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate | Gridly</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="bg-auth">
    <main>
        <section class="tarjeta-auth">
            <div class="logo-auth">
                <div class="logo-icono">G</div>
            </div>
            <h1>Únete a Gridly</h1>
            <p class="subtitulo">Crea una cuenta para guardar tus ideas favoritas</p>

            <form action="index.html" class="auth-form">
                <div class="grupo-input">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" placeholder="Ej. Leonardo Dev" required>
                </div>

                <div class="grupo-input">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="usuario@ejemplo.com" required>
                </div>

                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Crea una contraseña segura" required>
                </div>

                <button type="submit" class="btn-primario">Registrarse</button>
            </form>

            <div class="auth-links">
                <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </section>
    </main>
</body>

</html>
