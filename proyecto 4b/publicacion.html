<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Publicación | Mosaiko</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">
            <div class="logo-icono">G</div>
            <div class="logo-texto">Gridly</div>
        </a>

        <input type="search" placeholder="Buscar ideas, diseños, arquitectura..." class="buscador">

        <nav>
            <a href="usuario.html" class="link-texto">Mi Perfil</a>
            <a href="login.html" class="btn-primario">Cerrar Sesión</a>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar-izq">
            <nav class="menu-lateral">
                <div class="grupo-menu">
                    <a href="index.html" class="item-menu"><span class="icono"></span> Inicio</a>
                    <a href="explorar.html" class="item-menu"><span class="icono"></span> Explorar</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Tablero</h3>
                    <a href="pines.html" class="item-menu"><span class="icono"></span> Pines</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Crear</h3>
                    <a href="publicacion.html" class="item-menu activo" style="font-weight:bold; color:var(--color-morado);"><span class="icono"></span> Publicación</a>
                    <a href="tableros.html" class="item-menu"><span class="icono"></span> Tableros</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Social</h3>
                    <a href="notificaciones.html" class="item-menu"><span class="icono"></span> Notificaciones</a>
                    <a href="mensajeria.html" class="item-menu"><span class="icono"></span> Mensajería</a>
                    <a href="seguidos.html" class="item-menu"><span class="icono"></span> Seguidos</a>
                </div>
            </nav>
        </aside>

        <main class="contenido-principal">
            <!-- 4. CREAR PUBLICACION -->
            <section class="seccion-app sec-crear-pub" style="display: block;">
                <div class="contenedor-formulario">
                    <h2>Crear Nueva Publicación</h2>
                    <form id="form-crear-pub" class="form-crear" onsubmit="event.preventDefault(); crearPublicacion();">
                        <div class="zona-subida" style="position: relative; overflow: hidden; min-height: 200px;">
                            <p id="texto-subida">Haz clic aquí para seleccionar tu imagen</p>
                            <img id="preview-img" style="display:none; width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; z-index:1; pointer-events:none;">
                            <input type="file" id="pub-file" accept="image/*" required style="position: absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; z-index:2;">
                        </div>
                        <div class="campos-form">
                            <input type="text" id="pub-titulo" placeholder="Añade un título" class="input-form" required>
                            <textarea id="pub-desc" placeholder="Cuenta a todos de qué trata tu publicación" class="input-form"></textarea>
                            <input type="text" id="pub-tags" placeholder="Añade etiquetas (#hashtags)" class="input-form">
                            <button type="submit" class="btn-primario" id="btn-submit-pub">Publicar</button>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Script para Autenticación -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.getElementById('pub-file');
            const preview = document.getElementById('preview-img');
            const texto = document.getElementById('texto-subida');
            
            if(input) {
                input.addEventListener('change', function() {
                    if(this.files && this.files[0]) {
                        preview.src = URL.createObjectURL(this.files[0]);
                        preview.style.display = 'block';
                        texto.style.display = 'none';
                    } else {
                        preview.style.display = 'none';
                        preview.src = '';
                        texto.style.display = 'block';
                    }
                });
            }
        });
    </script>
</body>

</html>
