<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones | Mosaiko</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <a href="index.html" class="logo">
            <div class="logo-icono">G</div>
            <div class="logo-texto">Gridly</div>
        </a>

        <input type="search" placeholder="Buscar ideas, diseños, arquitectura..." class="buscador">

        <nav>
            <a href="usuario.html" class="link-texto">Mi Perfil</a>
            <a href="login.html" class="btn-primario">Cerrar Sesión</a>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar-izq">
            <nav class="menu-lateral">
                <div class="grupo-menu">
                    <a href="index.html" class="item-menu"><span class="icono"></span> Inicio</a>
                    <a href="explorar.html" class="item-menu"><span class="icono"></span> Explorar</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Tablero</h3>
                    <a href="pines.html" class="item-menu"><span class="icono"></span> Pines</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Crear</h3>
                    <a href="publicacion.html" class="item-menu"><span class="icono"></span> Publicación</a>
                    <a href="tableros.html" class="item-menu"><span class="icono"></span> Tableros</a>
                </div>

                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Social</h3>
                    <a href="notificaciones.html" class="item-menu activo" style="font-weight:bold; color:var(--color-morado);"><span class="icono"></span> Notificaciones</a>
                    <a href="mensajeria.html" class="item-menu"><span class="icono"></span> Mensajería</a>
                    <a href="seguidos.html" class="item-menu"><span class="icono"></span> Seguidos</a>
                </div>
            </nav>
        </aside>

        <main class="contenido-principal">
            <!-- 7. NOTIFICACIONES -->
            <section class="seccion-app sec-notif" style="display: block;">
                <div class="encabezado-seccion">
                    <h2>Tus Notificaciones</h2>
                </div>
                <div class="lista-notificaciones" id="lista-notificaciones">
                    <p style="text-align:center; color:#8892a0;">Cargando notificaciones...</p>
                </div>
            </section>
        </main>
    </div>
    
    <!-- Script para Autenticación -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contenedor = document.getElementById('lista-notificaciones');
            const usuarioId = localStorage.getItem('usuario_id');
            if(!usuarioId) {
                contenedor.innerHTML = '<p style="text-align:center; padding:20px; color:#8892a0;">Inicia sesión para ver tus notificaciones.</p>';
                return;
            }
            
            fetch(`http://localhost:8000/usuarios/${usuarioId}/notificaciones/`)
                .then(r => r.json())
                .then(notifs => {
                    contenedor.innerHTML = '';
                    if(notifs.length === 0) {
                        contenedor.innerHTML = '<p style="text-align:center; padding:20px; color:#8892a0;">No tienes notificaciones nuevas.</p>';
                        return;
                    }
                    notifs.forEach(n => {
                        contenedor.innerHTML += `
                            <div class="notificacion ${n.leida ? '' : 'no-leida'}">
                                <div class="notif-avatar" style="background:var(--color-morado);">N</div>
                                <div class="notif-texto">${n.texto}</div>
                            </div>
                        `;
                    });
                })
                .catch(e => contenedor.innerHTML = '<p style="color:red;">Error al cargar</p>');
        });
    </script>
</body>

</html>
