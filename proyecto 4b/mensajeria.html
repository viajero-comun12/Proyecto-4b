<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes | Gridly</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
    <style>
        .layout-mensajeria {
            display: flex;
            height: calc(100vh - 70px);
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #e0ddd8;
            background: #fff;
        }
        /* Panel izquierdo */
        .panel-contactos {
            width: 300px;
            min-width: 260px;
            border-right: 1px solid #e0ddd8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-contactos-header {
            padding: 18px 16px 10px;
            border-bottom: 1px solid #e0ddd8;
        }
        .panel-contactos-header h3 { margin: 0 0 10px; font-size: 1.1rem; color: #002147; }
        .buscador-contactos {
            width: 100%; box-sizing: border-box;
            padding: 8px 12px; border-radius: 20px;
            border: 1px solid #ddd; font-size: 0.9rem;
            background: #f5f4f0; outline: none;
        }
        .tabs-mensajes {
            display: flex; border-bottom: 1px solid #e0ddd8;
        }
        .tab-btn {
            flex: 1; padding: 10px; font-size: 0.85rem;
            border: none; background: none; cursor: pointer;
            color: #8892a0; font-weight: 600; transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.activo { color: #620096; border-bottom-color: #620096; }
        .lista-panel { flex: 1; overflow-y: auto; }
        .contact-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; cursor: pointer; transition: background 0.15s;
            border-bottom: 1px solid #f0eee9;
        }
        .contact-item:hover { background: #f5f4f0; }
        .contact-item.activo { background: #f0e8f9; }
        .c-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.1rem; color: white;
            flex-shrink: 0;
        }
        .c-info { flex: 1; overflow: hidden; }
        .c-info strong { display: block; font-size: 0.9rem; color: #002147; }
        .c-info .preview { font-size: 0.8rem; color: #8892a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge-nuevo {
            background: #620096; color: white;
            border-radius: 50%; width: 18px; height: 18px;
            font-size: 0.7rem; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }

        /* Panel derecho - chat */
        .panel-chat {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        .chat-header {
            padding: 14px 20px; border-bottom: 1px solid #e0ddd8;
            display: flex; align-items: center; gap: 12px;
            background: #fff;
        }
        .chat-header .c-avatar { width: 36px; height: 36px; font-size: 0.95rem; }
        .chat-header-info strong { display: block; font-size: 0.95rem; color: #002147; }
        .chat-header-info small { color: #8892a0; font-size: 0.8rem; }
        .chat-vacio {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #ccc;
        }
        .chat-vacio .icono-chat { font-size: 3rem; margin-bottom: 12px; }
        .chat-mensajes {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .burbuja-wrapper {
            display: flex; align-items: flex-end; gap: 8px;
            max-width: 75%;
        }
        .burbuja-wrapper.mia { align-self: flex-end; flex-direction: row-reverse; }
        .burbuja-wrapper.suya { align-self: flex-start; }
        .burbuja {
            padding: 9px 14px; border-radius: 18px;
            font-size: 0.9rem; line-height: 1.4; word-break: break-word;
        }
        .burbuja.mia {
            background: #620096; color: white;
            border-bottom-right-radius: 4px;
        }
        .burbuja.suya {
            background: #f0eee9; color: #002147;
            border-bottom-left-radius: 4px;
        }
        .burbuja-hora { font-size: 0.72rem; color: #aaa; flex-shrink: 0; }
        .chat-input-area {
            padding: 12px 20px; border-top: 1px solid #e0ddd8;
            display: flex; gap: 10px; align-items: center; background: #fff;
        }
        .chat-input-area input {
            flex: 1; padding: 10px 16px; border-radius: 24px;
            border: 1px solid #ddd; outline: none; font-size: 0.9rem;
            background: #f5f4f0;
        }
        .chat-input-area input:focus { border-color: #620096; }
        .btn-enviar-msg {
            padding: 10px 22px; background: #620096;
            color: white; border: none; border-radius: 24px;
            cursor: pointer; font-weight: 700; font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .btn-enviar-msg:hover { opacity: 0.85; }
        .btn-enviar-msg:disabled { opacity: 0.4; cursor: default; }
        .separador-fecha {
            text-align: center; font-size: 0.75rem;
            color: #bbb; margin: 6px 0;
        }
    </style>
</head>

<body>
    <header>
        <a href="index.html" class="logo">
            <div class="logo-icono">G</div>
            <div class="logo-texto">Gridly</div>
        </a>
        <input type="search" placeholder="Buscar ideas..." class="buscador">
        <nav>
            <a href="usuario.html" class="link-texto">Mi Perfil</a>
            <a href="login.html" class="btn-primario" id="btn-logout">Cerrar Sesión</a>
        </nav>
    </header>

    <div class="app-container">
        <aside class="sidebar-izq">
            <nav class="menu-lateral">
                <div class="grupo-menu">
                    <a href="index.html" class="item-menu"><span class="icono"></span> Inicio</a>
                    <a href="explorar.html" class="item-menu"><span class="icono"></span> Explorar</a>
                </div>
                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Tablero</h3>
                    <a href="pines.html" class="item-menu"><span class="icono"></span> Pines</a>
                </div>
                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Crear</h3>
                    <a href="publicacion.html" class="item-menu"><span class="icono"></span> Publicación</a>
                    <a href="tableros.html" class="item-menu"><span class="icono"></span> Tableros</a>
                    <a href="collages.html" class="item-menu"><span class="icono"></span> Collage</a>
                </div>
                <div class="grupo-menu">
                    <h3 class="titulo-grupo">Social</h3>
                    <a href="notificaciones.html" class="item-menu"><span class="icono"></span> Notificaciones</a>
                    <a href="mensajeria.html" class="item-menu activo" style="font-weight:bold; color:var(--color-morado);"><span class="icono"></span> Mensajería</a>
                </div>
            </nav>
        </aside>

        <main class="contenido-principal" style="padding: 16px;">
            <div class="layout-mensajeria">

                <!-- Panel Izquierdo: Contactos -->
                <div class="panel-contactos">
                    <div class="panel-contactos-header">
                        <h3>💬 Mensajes</h3>
                        <input type="search" id="buscador-contactos" class="buscador-contactos" placeholder="Buscar usuario...">
                    </div>
                    <div class="tabs-mensajes">
                        <button class="tab-btn activo" id="tab-chats" onclick="mostrarTab('chats')">Chats</button>
                        <button class="tab-btn" id="tab-usuarios" onclick="mostrarTab('usuarios')">Usuarios</button>
                    </div>
                    <div class="lista-panel" id="lista-panel">
                        <p style="padding:20px; color:#8892a0; text-align:center; font-size:0.9rem;">Cargando...</p>
                    </div>
                </div>

                <!-- Panel Derecho: Chat activo -->
                <div class="panel-chat">
                    <!-- Estado vacío (por defecto) -->
                    <div class="chat-vacio" id="estado-vacio">
                        <div class="icono-chat">💬</div>
                        <p>Selecciona un chat para empezar</p>
                        <small style="color:#bbb; margin-top:6px;">O busca un usuario en la pestaña "Usuarios"</small>
                    </div>

                    <!-- Vista de chat activo (oculta por defecto) -->
                    <div id="vista-chat" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
                        <div class="chat-header">
                            <div class="c-avatar" id="chat-avatar-dest" style="background:#620096;">U</div>
                            <div class="chat-header-info">
                                <strong id="chat-nombre-dest">Usuario</strong>
                                <small id="chat-id-dest"></small>
                            </div>
                        </div>
                        <div class="chat-mensajes" id="chat-mensajes"></div>
                        <form class="chat-input-area" id="form-mensaje" onsubmit="enviarMensaje(event)">
                            <input type="text" id="input-mensaje" placeholder="Escribe un mensaje..." autocomplete="off" required>
                            <button type="submit" class="btn-enviar-msg" id="btn-enviar">Enviar</button>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const API = 'http://localhost:8000';
        const miId = parseInt(localStorage.getItem('usuario_id'));
        const miUsername = localStorage.getItem('username') || `usuario_${miId}`;
        let destinatarioActualId = null;
        let tabActual = 'chats';
        let todosUsuarios = [];
        let pollingInterval = null;

        const colores = ['#620096','#002147','#e91e8c','#00897b','#e65100','#1565c0'];
        const getColor = (id) => colores[id % colores.length];
        const getInicial = (username) => (username || 'U')[0].toUpperCase();

        // ==========================================
        // INICIALIZACIÓN
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            if (!miId) {
                document.getElementById('lista-panel').innerHTML =
                    '<p style="padding:20px; color:#8892a0; text-align:center;">Inicia sesión para ver tus mensajes.</p>';
                return;
            }
            cargarTodosUsuarios();
            mostrarTab('chats');

            // Buscar en lista
            document.getElementById('buscador-contactos').addEventListener('input', (e) => {
                filtrarLista(e.target.value);
            });
        });

        // ==========================================
        // TABS
        // ==========================================
        function mostrarTab(tab) {
            tabActual = tab;
            document.getElementById('tab-chats').classList.toggle('activo', tab === 'chats');
            document.getElementById('tab-usuarios').classList.toggle('activo', tab === 'usuarios');

            if (tab === 'chats') cargarChats();
            else renderizarUsuarios(todosUsuarios);
        }

        // ==========================================
        // CARGAR TODOS LOS USUARIOS (para tab "Usuarios")
        // ==========================================
        async function cargarTodosUsuarios() {
            try {
                const res = await fetch(`${API}/usuarios/`);
                todosUsuarios = await res.json();
                // Excluir el usuario actual
                todosUsuarios = todosUsuarios.filter(u => u.id !== miId);
            } catch(e) { console.error(e); }
        }

        function renderizarUsuarios(usuarios) {
            const panel = document.getElementById('lista-panel');
            panel.innerHTML = '';

            if (!usuarios || usuarios.length === 0) {
                panel.innerHTML = '<p style="padding:20px; color:#8892a0; text-align:center; font-size:0.9rem;">No hay otros usuarios.</p>';
                return;
            }

            usuarios.forEach(u => {
                const div = crearItemContacto(u.id, u.username, 'Iniciar conversación', false);
                panel.appendChild(div);
            });
        }

        // ==========================================
        // CARGAR CHATS (conversaciones activas)
        // ==========================================
        async function cargarChats() {
            const panel = document.getElementById('lista-panel');
            panel.innerHTML = '<p style="padding:20px; color:#8892a0; text-align:center; font-size:0.9rem;">Cargando chats...</p>';

            try {
                const res = await fetch(`${API}/mensajes/${miId}`);
                const mensajes = await res.json();

                // Agrupar por interlocutor
                const chatsMap = new Map();
                mensajes.forEach(m => {
                    const otroId = m.remitente_id === miId ? m.destinatario_id : m.remitente_id;
                    if (!chatsMap.has(otroId) || new Date(m.fecha_envio) > new Date(chatsMap.get(otroId).fecha_envio)) {
                        chatsMap.set(otroId, m);
                    }
                });

                panel.innerHTML = '';

                if (chatsMap.size === 0) {
                    panel.innerHTML = '<p style="padding:20px; color:#8892a0; text-align:center; font-size:0.9rem;">No tienes chats aún.<br>Ve a "Usuarios" para iniciar uno.</p>';
                    return;
                }

                // Para cada chat, buscar username
                for (const [otroId, ultimoMsg] of chatsMap) {
                    const u = todosUsuarios.find(u => u.id === otroId);
                    const username = u ? u.username : `usuario_${otroId}`;
                    const preview = (ultimoMsg.remitente_id === miId ? 'Tú: ' : '') + ultimoMsg.texto;
                    const div = crearItemContacto(otroId, username, preview, destinatarioActualId === otroId);
                    panel.appendChild(div);
                }

            } catch(e) {
                panel.innerHTML = '<p style="padding:20px; color:red; text-align:center;">Error al cargar chats.</p>';
            }
        }

        function crearItemContacto(userId, username, preview, activo) {
            const div = document.createElement('div');
            div.className = 'contact-item' + (activo ? ' activo' : '');
            div.id = `contact-${userId}`;
            div.innerHTML = `
                <div class="c-avatar" style="background:${getColor(userId)}">${getInicial(username)}</div>
                <div class="c-info">
                    <strong>@${username}</strong>
                    <span class="preview">${preview}</span>
                </div>
            `;
            div.onclick = () => abrirChat(userId, username);
            return div;
        }

        // ==========================================
        // FILTRAR LISTA
        // ==========================================
        function filtrarLista(query) {
            const q = query.toLowerCase();
            const items = document.querySelectorAll('.contact-item');
            items.forEach(item => {
                const texto = item.textContent.toLowerCase();
                item.style.display = texto.includes(q) ? '' : 'none';
            });
        }

        // ==========================================
        // ABRIR CHAT
        // ==========================================
        async function abrirChat(userId, username) {
            destinatarioActualId = userId;

            // Marcar activo
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('activo'));
            const el = document.getElementById(`contact-${userId}`);
            if (el) el.classList.add('activo');

            // Mostrar panel chat
            document.getElementById('estado-vacio').style.display = 'none';
            const vistaChat = document.getElementById('vista-chat');
            vistaChat.style.display = 'flex';

            // Header
            document.getElementById('chat-avatar-dest').textContent = getInicial(username);
            document.getElementById('chat-avatar-dest').style.background = getColor(userId);
            document.getElementById('chat-nombre-dest').textContent = '@' + username;
            document.getElementById('chat-id-dest').textContent = `ID: ${userId}`;

            // Cargar conversación
            await cargarConversacion(userId);

            // Polling cada 4 segundos para mensajes nuevos
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(() => cargarConversacion(userId), 4000);

            document.getElementById('input-mensaje').focus();
        }

        // ==========================================
        // CARGAR CONVERSACIÓN
        // ==========================================
        async function cargarConversacion(otroId) {
            try {
                const res = await fetch(`${API}/mensajes/${miId}/conversacion/${otroId}`);
                const mensajes = await res.json();
                renderizarMensajes(mensajes);
            } catch(e) {
                console.error('Error al cargar conversación:', e);
            }
        }

        function renderizarMensajes(mensajes) {
            const cont = document.getElementById('chat-mensajes');
            const estabaBajo = cont.scrollHeight - cont.scrollTop <= cont.clientHeight + 50;
            cont.innerHTML = '';

            if (mensajes.length === 0) {
                cont.innerHTML = '<p style="text-align:center; color:#ccc; margin-top:40px;">Aún no hay mensajes. ¡Di hola!</p>';
                return;
            }

            let fechaAnterior = '';
            mensajes.forEach(m => {
                const esMio = m.remitente_id === miId;
                const fechaObj = new Date(m.fecha_envio);
                const fechaStr = fechaObj.toLocaleDateString('es-ES');

                if (fechaStr !== fechaAnterior) {
                    const sep = document.createElement('div');
                    sep.className = 'separador-fecha';
                    sep.textContent = fechaStr === new Date().toLocaleDateString('es-ES') ? 'Hoy' : fechaStr;
                    cont.appendChild(sep);
                    fechaAnterior = fechaStr;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'burbuja-wrapper ' + (esMio ? 'mia' : 'suya');

                const hora = fechaObj.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                wrapper.innerHTML = `
                    <div class="burbuja ${esMio ? 'mia' : 'suya'}">${escapeHtml(m.texto)}</div>
                    <span class="burbuja-hora">${hora}</span>
                `;
                cont.appendChild(wrapper);
            });

            if (estabaBajo) cont.scrollTop = cont.scrollHeight;
        }

        // ==========================================
        // ENVIAR MENSAJE
        // ==========================================
        async function enviarMensaje(event) {
            event.preventDefault();
            if (!destinatarioActualId) return;

            const input = document.getElementById('input-mensaje');
            const texto = input.value.trim();
            if (!texto) return;

            const btn = document.getElementById('btn-enviar');
            btn.disabled = true;
            input.value = '';

            try {
                const res = await fetch(`${API}/mensajes/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        texto: texto,
                        remitente_id: miId,
                        destinatario_id: destinatarioActualId
                    })
                });

                if (res.ok) {
                    await cargarConversacion(destinatarioActualId);
                    if (tabActual === 'chats') cargarChats();
                } else {
                    const err = await res.json();
                    alert('Error: ' + (err.detail || 'No se pudo enviar'));
                    input.value = texto;
                }
            } catch(e) {
                alert('Error de conexión');
                input.value = texto;
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        // ==========================================
        // UTILIDADES
        // ==========================================
        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>
</body>
</html>
