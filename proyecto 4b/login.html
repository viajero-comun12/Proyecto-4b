<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Gridly</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="bg-auth">
    <main>
           <div class="tarjeta-auth">
            <header class="header-auth">
                <a href="/" class="logo-auth" aria-label="Ir al inicio de Gridly">
                    <div class="logo-icono" aria-hidden="true">G</div>
                </a>
                <h1>Bienvenido a Gridly</h1>
                <p class="subtitulo">Encuentra nuevas ideas para probar</p>
            </header>

            <form id="login-form" class="auth-form">
                <div class="grupo-input">
                    <label for="username">Nombre de Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Tu usuario" autocomplete="username" required>
                </div>

                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Tu contraseña segura" autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn-primario">Iniciar Sesión</button>
            </form>


            <div class="auth-links">
                <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>
        </div>
    </main>
    <!-- Script de Autenticación -->
    <script src="js/auth.js"></script>
</body>

</html>
