<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Gridly</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="bg-auth">
    <main>
        <section class="tarjeta-auth">
            <div class="logo-auth">
                <div class="logo-icono">G</div>
            </div>
            <h1>Bienvenido a Gridly</h1>
            <p class="subtitulo">Encuentra nuevas ideas para probar</p>

            <form action="index.html" class="auth-form">
                <div class="grupo-input">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="usuario@ejemplo.com" required>
                </div>

                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña segura" required>
                </div>

                <button type="submit" class="btn-primario">Iniciar Sesión</button>
            </form>

            <div class="auth-links">
                <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            </div>
        </section>
    </main>
</body>

</html>
